name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity minimal

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/Fluxorq/Fluxorq.csproj
          --no-build -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./nupkgs

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: "Fluxorq ${{ github.ref_name }}"
          body: |
            ## Fluxorq ${{ github.ref_name }}

            See [README](https://github.com/arijeetganguli/Fluxorq#readme) for full documentation.

            ### Install
            ```bash
            dotnet add package Fluxorq --version ${{ steps.version.outputs.VERSION }}
            ```
          files: ./nupkgs/*.nupkg
          generate_release_notes: true
