name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity minimal

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/Fluxorq/Fluxorq.csproj
          --no-build -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./nupkgs

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fluxorq ${{ github.ref_name }}"
          body: |
            ## Fluxorq ${{ github.ref_name }}

            See [README](https://github.com/arijeetganguli/Fluxorq#readme) for full documentation.

            ### Install
            ```bash
            dotnet add package Fluxorq --version ${{ steps.version.outputs.VERSION }}
            ```
          files: ./nupkgs/*.nupkg
          generate_release_notes: true
